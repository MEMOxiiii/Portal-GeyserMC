name: Build Portal-GeyserMC
on:
  release:
    types:
      - created
jobs:
  build:
    name: Build JAR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'
      - name: Build JAR
        run: gradle jar
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/libs/*.jar
